<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regulator - ACRA Withdrawal Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f1e8;
      --panel: #fffdf8;
      --panel-2: #f8f4eb;
      --text: #171717;
      --muted: #6b6b6b;
      --line: #ddd6c8;
      --accent: #1f5cff;
      --accent-soft: rgba(31, 92, 255, 0.08);
      --warn: #b85b3d;
      --warn-soft: rgba(184, 91, 61, 0.10);
      --ok: #2b7a61;
      --ok-soft: rgba(43, 122, 97, 0.10);
      --review: #9c7a2d;
      --review-soft: rgba(156, 122, 45, 0.12);
      --sans: 'Plus Jakarta Sans', sans-serif;
      --serif: 'Instrument Serif', serif;
      --mono: 'JetBrains Mono', monospace;
    }
    html, body { height: 100%; }
    body {
      font-family: var(--sans);
      background: linear-gradient(180deg, #f7f4ed, #eee7db);
      color: var(--text);
      overflow: hidden;
    }
    button { font-family: inherit; }
    .app-shell { display: grid; grid-template-columns: 248px 1fr; height: 100%; }
    .sidebar {
      background: #fff;
      border-right: 1px solid var(--line);
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .brand {
      font: 30px var(--serif);
      padding: 4px 8px 16px;
      border-bottom: 1px solid var(--line);
    }
    .nav-group { display: flex; flex-direction: column; gap: 6px; }
    .nav-title {
      font: 500 10px var(--mono);
      letter-spacing: .14em;
      text-transform: uppercase;
      color: #9a9a9a;
      padding: 0 8px 6px;
    }
    .nav-button {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-radius: 10px;
      border: none;
      background: none;
      color: #4b4b4b;
      font: 500 13px var(--sans);
      text-align: left;
      cursor: pointer;
    }
    .nav-button:hover, .nav-button.active {
      background: var(--accent-soft);
      color: var(--accent);
    }
    .badge {
      font: 500 10px var(--mono);
      padding: 2px 7px;
      border-radius: 999px;
      background: var(--warn);
      color: #fff;
    }
    .sidebar-user {
      margin-top: auto;
      border-top: 1px solid var(--line);
      padding: 14px 8px 0;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }
    .main { display: flex; flex-direction: column; min-width: 0; }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: #fff;
      border-bottom: 1px solid var(--line);
    }
    .breadcrumb { font-size: 13px; color: var(--muted); }
    .topbar-stamp {
      font-size: 12px;
      color: var(--muted);
      border: 1px solid var(--line);
      padding: 8px 12px;
      border-radius: 999px;
      background: #fff;
    }
    .content { padding: 22px; overflow: auto; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 18px; }
    .card, .stat, .review-box, .portal, .agent-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
    }
    .stat { padding: 16px; }
    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #8b8b8b;
      margin-bottom: 8px;
    }
    .stat-value { font: 34px var(--serif); }
    .warn { color: var(--warn); }
    .ok { color: var(--ok); }
    .card { padding: 16px; }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .section-title { font: 30px var(--serif); }
    .muted { font-size: 13px; color: var(--muted); }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid #ede7da;
      text-align: left;
      font-size: 13px;
    }
    th {
      font: 500 10px var(--mono);
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #8d8d8d;
    }
    tr:last-child td { border-bottom: none; }
    .pill {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      font: 500 10px var(--mono);
    }
    .pill.warn { background: var(--warn-soft); color: var(--warn); }
    .pill.ok { background: var(--ok-soft); color: var(--ok); }
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }
    .hero h2 { font: 36px var(--serif); }
    .steps {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .step {
      padding: 12px;
      text-align: center;
      font-size: 12px;
      color: #909090;
      border-right: 1px solid var(--line);
    }
    .step:last-child { border-right: none; }
    .step.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
    .step.done { background: var(--ok-soft); color: var(--ok); font-weight: 600; }
    .feed { display: flex; flex-direction: column; gap: 10px; }
    .feed-item {
      display: flex;
      gap: 12px;
      padding: 12px;
      border: 1px solid #ece5d8;
      border-radius: 12px;
      background: #fff;
    }
    .feed-icon {
      width: 24px;
      height: 24px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      font: 700 11px var(--mono);
      flex: 0 0 auto;
    }
    .feed-icon.warn { background: var(--warn-soft); color: var(--warn); }
    .feed-icon.info { background: var(--accent-soft); color: var(--accent); }
    .feed-icon.ok { background: var(--ok-soft); color: var(--ok); }
    .feed-title { font-size: 14px; font-weight: 600; }
    .feed-meta {
      margin-top: 4px;
      font: 500 10px var(--mono);
      color: #8d8d8d;
    }
    .hint {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
    }
    .btn {
      border: none;
      border-radius: 10px;
      padding: 11px 16px;
      font: 600 13px var(--sans);
      cursor: pointer;
    }
    .btn.primary { background: #171717; color: #fff; }
    .btn.secondary { background: var(--accent); color: #fff; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .upload-zone {
      border: 2px dashed var(--line);
      padding: 34px 20px;
      border-radius: 16px;
      text-align: center;
      background: #fff;
      cursor: pointer;
    }
    .upload-zone h3 { font: 30px var(--serif); margin-bottom: 6px; }
    .uploads { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
    .upload-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      border: 1px solid #ece5d8;
      border-radius: 12px;
      background: #fff;
    }
    .review-box { overflow: hidden; }
    .review-head {
      display: flex;
      justify-content: space-between;
      padding: 14px 16px;
      background: var(--panel-2);
      border-bottom: 1px solid var(--line);
    }
    .group { padding: 14px 0; }
    .group-title {
      padding: 0 16px 8px;
      font: 500 10px var(--mono);
      letter-spacing: .14em;
      text-transform: uppercase;
      color: #8e8e8e;
    }
    .field {
      display: grid;
      grid-template-columns: 180px 1fr 20px;
      gap: 10px;
      padding: 10px 16px;
      border-top: 1px solid #f0eadf;
      align-items: center;
    }
    .field:first-of-type { border-top: none; }
    .field-name { font-size: 13px; color: #666; }
    .field-value {
      padding: 8px 10px;
      border: 1px solid #e8e1d4;
      border-radius: 8px;
      background: #faf7ef;
      font-size: 13px;
    }
    .field-value.warn { background: var(--warn-soft); border-color: #e2c7be; }
    .status-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font: 700 10px var(--mono);
    }
    .status-dot.ok { background: var(--ok-soft); color: var(--ok); }
    .status-dot.review { background: var(--review-soft); color: var(--review); }
    .status-dot.missing { background: var(--warn-soft); color: var(--warn); }
    .action {
      margin: 0 16px 12px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
    }
    .action.warnbox { background: var(--warn-soft); }
    .action.notebox { background: var(--review-soft); }
    .action-button {
      display: inline-block;
      margin-top: 6px;
      color: var(--accent);
      font-weight: 600;
      cursor: pointer;
      text-decoration: underline;
    }
    .workspace { display: grid; grid-template-columns: 1fr 300px; gap: 14px; }
    .portal-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #f1f1f1;
      border-bottom: 1px solid #dadada;
    }
    .browser-dot { width: 9px; height: 9px; border-radius: 50%; }
    .red { background: #ff5f57; }
    .yellow { background: #febc2e; }
    .green { background: #28c840; }
    .portal-url {
      flex: 1;
      background: #fff;
      border: 1px solid #d8d8d8;
      border-radius: 8px;
      padding: 6px 10px;
      font: 500 11px var(--mono);
      color: #666;
    }
    .portal-body { padding: 18px; }
    .portal-body h3 { font-size: 18px; color: #003d7c; margin-bottom: 4px; }
    .portal-body p { font-size: 12px; color: #666; margin-bottom: 14px; }
    .portal-row {
      display: grid;
      grid-template-columns: 190px 1fr;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid #ececec;
    }
    .portal-row:last-child { border-bottom: none; }
    .portal-value {
      min-height: 30px;
      border: 1px solid #d7d7d7;
      border-radius: 8px;
      background: #fafafa;
      padding: 7px 10px;
      font-size: 13px;
    }
    .portal-value.filling { border-color: #0ea5e9; background: rgba(14, 165, 233, 0.08); }
    .portal-value.filled { border-color: var(--ok); background: rgba(43, 122, 97, 0.06); }
    .agent-panel { display: flex; flex-direction: column; }
    .agent-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-2);
      font: 500 11px var(--mono);
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #7b7b7b;
    }
    .agent-log { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; min-height: 420px; }
    .log-line { padding-bottom: 10px; border-bottom: 1px solid #eee7db; font-size: 13px; color: #575757; }
    .summary { text-align: center; padding: 34px 24px; }
    .summary h3 { font: 36px var(--serif); margin-bottom: 8px; }
    .summary p { max-width: 680px; margin: 0 auto 18px; color: var(--muted); }
    .summary-grid {
      display: flex;
      justify-content: center;
      gap: 28px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }
    .summary-num { font: 32px var(--serif); color: var(--ok); }
    @media (max-width: 980px) {
      .app-shell { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .grid-4 { grid-template-columns: repeat(2, 1fr); }
      .workspace { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="data/frontend_payload.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useEffect, useState, useCallback } = React;

    const fallbackData = {
      stats: [
        ['Active workflows', '18', ''],
        ['Review required', '4', 'warn'],
        ['Graph rebuilds', '1', 'warn'],
        ['Stable runs', '27', 'ok'],
      ],
      table: [
        ['Atlas Restructuring Pte Ltd', 'Withdrawal from Approved Liquidators', '28 Mar 2026, 9:02 AM', '2 changes', 'warn', 'graph refresh'],
        ['Harbour Advisory LLP', 'Approved Liquidator Renewal', '27 Mar 2026, 4:51 PM', 'stable', 'ok', 'none'],
        ['Northstar Recovery', 'Practice Update Monitoring', '27 Mar 2026, 1:18 PM', 'stable', 'ok', 'canary clear'],
      ],
      changes: [
        { kind: 'warn', title: 'Eligibility wording changed on ACRA guidance page', desc: 'Semantic diff marked the withdrawal eligibility language as material. The affected graph branch has been queued for refresh.', meta: 'Node diff · material · section 3 guidance' },
        { kind: 'warn', title: 'Supporting document list expanded', desc: 'Current extract includes an additional document expectation for withdrawal submissions.', meta: 'Version history delta · detected this run' },
        { kind: 'info', title: 'Top-level navigation drift detected', desc: 'Canary noticed ACRA navigation layout drift. Maintenance mode will rebuild the broader baseline graph after this run.', meta: 'Canary status · changed but non-blocking' },
        { kind: 'ok', title: 'No change to declaration acknowledgement wording', desc: 'Hash remained stable, so this branch can be reused without review.', meta: 'Hash stable · high confidence' },
      ],
      uploads: [
        ['acra_withdrawal_form.pdf', '212 KB', 'Field list and declarations extracted'],
        ['supporting_statement.pdf', '86 KB', 'Narrative grounds converted into structured facts'],
        ['regulatory_correspondence.pdf', '131 KB', 'Prior ACRA references linked to graph nodes'],
      ],
      groups: [
        ['Applicant details', [
          ['Applicant name', 'Rachel Tan', 'ok'],
          ['Organisation', 'Atlas Restructuring Pte Ltd', 'ok'],
          ['Registration number', '201912345A', 'ok'],
        ]],
        ['Withdrawal request', [
          ['Application type', 'Withdrawal from being approved liquidators', 'ok'],
          ['Requested effective date', '30 April 2026', 'review'],
          ['Grounds for withdrawal', 'Ceasing practice and closing active appointments in phases', 'review'],
        ]],
        ['Supporting compliance checks', [
          ['Outstanding appointments cleared', 'Pending documentary confirmation', 'missing'],
          ['Required supporting documents', 'Identity document, signed statement, supporting correspondence', 'ok'],
        ]],
      ],
      actions: [
        ['warnbox', 'Action', 'Confirm documentary evidence that all active liquidation appointments have been handed over.', 'Resolved - handover evidence attached'],
        ['notebox', 'Note', 'Review the new ACRA guidance wording before releasing the final review package.', 'Reviewed - use refreshed wording'],
      ],
      fill: [
        ['Applicant Name', 'Rachel Tan'],
        ['Organisation', 'Atlas Restructuring Pte Ltd'],
        ['Registration Number', '201912345A'],
        ['Request Type', 'Withdrawal from being approved liquidators'],
        ['Effective Date', '30 April 2026'],
        ['Grounds', 'Ceasing practice and handing over active matters'],
        ['Supporting Statement', 'Prepared'],
        ['Regulatory Correspondence', 'Prepared'],
      ],
    };

    const demoData = window.REGULATOR_PAYLOAD || fallbackData;

    function Sidebar({ screen, onNavigate }) {
      return (
        <aside className="sidebar">
          <div className="brand">Regulator.</div>
          <div className="nav-group">
            <div className="nav-title">Overview</div>
            <button className={`nav-button ${screen === 'dashboard' ? 'active' : ''}`} onClick={() => onNavigate('dashboard')}>
              Dashboard <span className="badge">1</span>
            </button>
            <button className="nav-button">Change Feed</button>
          </div>
          <div className="nav-group">
            <div className="nav-title">Clients</div>
            <button className={`nav-button ${screen === 'client' ? 'active' : ''}`} onClick={() => onNavigate('client')}>
              Atlas Restructuring <span className="badge">2</span>
            </button>
            <button className="nav-button">Liquidation Desk</button>
            <button className="nav-button">Regulatory Ops</button>
          </div>
          <div className="sidebar-user">Rachel Tan<br />Senior QI</div>
        </aside>
      );
    }

    function Dashboard({ onOpenClient }) {
      return (
        <section>
          <div className="grid-4">
            {demoData.stats.map(([label, value, tone]) => (
              <div className="stat" key={label}>
                <div className="stat-label">{label}</div>
                <div className={`stat-value ${tone}`}>{value}</div>
              </div>
            ))}
          </div>
          <div className="card">
            <div className="section-head">
              <div className="section-title">Monitored Workflows</div>
              <div className="muted">View all</div>
            </div>
            <table>
              <thead>
                <tr>
                  <th>Client</th>
                  <th>Workflow</th>
                  <th>Last Run</th>
                  <th>Status</th>
                  <th>Alerts</th>
                </tr>
              </thead>
              <tbody>
                {demoData.table.map((row, index) => (
                  <tr key={index} onClick={index === 0 ? onOpenClient : undefined} style={{ cursor: index === 0 ? 'pointer' : 'default' }}>
                    <td>{row[0]}</td>
                    <td>{row[1]}</td>
                    <td>{row[2]}</td>
                    <td><span className={`pill ${row[4]}`}>{row[3]}</span></td>
                    <td>{row[5]}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </section>
      );
    }

    function ChangeFeed() {
      return (
        <div className="feed">
          {demoData.changes.map((item) => (
            <div className="feed-item" key={item.title}>
              <div className={`feed-icon ${item.kind}`}>{item.kind === 'warn' ? '!' : item.kind === 'ok' ? 'OK' : 'i'}</div>
              <div>
                <div className="feed-title">{item.title}</div>
                <div className="muted">{item.desc}</div>
                <div className="feed-meta">{item.meta}</div>
              </div>
            </div>
          ))}
        </div>
      );
    }

    function UploadStep({ uploaded, onUpload }) {
      return (
        <>
          {!uploaded && (
            <div className="upload-zone" onClick={onUpload}>
              <h3>Upload the ACRA withdrawal form pack</h3>
              <p className="muted">Simulated demo: OpenAI preprocesses files into structured fields and TinyFish goals.</p>
            </div>
          )}
          <div className="uploads">
            {uploaded && demoData.uploads.map((file) => (
              <div className="upload-row" key={file[0]}>
                <div>
                  <strong>{file[0]}</strong>
                  <div className="muted">{file[1]}</div>
                </div>
                <div className="muted">{file[2]}</div>
              </div>
            ))}
          </div>
        </>
      );
    }

    function ReviewStep({ resolved, setResolved, onContinue }) {
      const ready = resolved.length === demoData.actions.length;
      return (
        <>
          <div className="review-box">
            <div className="review-head">
              <span>Pre-populated Draft</span>
              <span>8 fields extracted</span>
            </div>
            <div className="review">
              {demoData.groups.map((group) => (
                <div className="group" key={group[0]}>
                  <div className="group-title">{group[0]}</div>
                  {group[1].map((field) => (
                    <div className="field" key={field[0]}>
                      <div className="field-name">{field[0]}</div>
                      <div className={`field-value ${field[2] !== 'ok' ? 'warn' : ''}`}>{field[1]}</div>
                      <div className={`status-dot ${field[2]}`}>{field[2] === 'ok' ? 'OK' : field[2] === 'review' ? '?' : '!'}</div>
                    </div>
                  ))}
                </div>
              ))}
              {demoData.actions.map((action, index) => (
                resolved.includes(index) ? null : (
                  <div className={`action ${action[0]}`} key={index}>
                    <strong>{action[1]}:</strong> {action[2]}<br />
                    <span className="action-button" onClick={() => setResolved([...resolved, index])}>{action[3]}</span>
                  </div>
                )
              ))}
            </div>
          </div>
          <div className="hint">
            <span>High confidence fields can flow to the simulated portal. Review-required fields stay gated.</span>
            <button className="btn secondary" disabled={!ready} onClick={onContinue}>Tinyfish simulated fill</button>
          </div>
        </>
      );
    }

    function PortalStep({ filledValues, logs }) {
      return (
        <div className="workspace">
          <div className="portal">
            <div className="portal-bar">
              <span className="browser-dot red"></span>
              <span className="browser-dot yellow"></span>
              <span className="browser-dot green"></span>
              <div className="portal-url">www.acra.gov.sg/approved-liquidators/withdrawal</div>
            </div>
            <div className="portal-body">
              <h3>Withdrawal from Approved Liquidators</h3>
              <p>Simulation only. Values are projected from the reviewed extraction output.</p>
              {demoData.fill.map((field, index) => (
                <div className="portal-row" key={field[0]}>
                  <div className="muted">{field[0]}</div>
                  <div className={`portal-value ${filledValues[index] === '' ? '' : filledValues[index] === field[1] ? 'filled' : 'filling'}`}>
                    {filledValues[index]}
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div className="agent-panel">
            <div className="agent-head">Tinyfish Agent</div>
            <div className="agent-log">
              {logs.map((line, index) => (
                <div className="log-line" key={index} dangerouslySetInnerHTML={{ __html: line }} />
              ))}
            </div>
          </div>
        </div>
      );
    }

    function DoneStep() {
      return (
        <div className="card summary">
          <h3>Review package prepared in 12 minutes.</h3>
          <p>The withdrawal workflow has been preprocessed, traced against ACRA guidance, checked against version history, and projected into a simulated fill experience.</p>
          <div className="summary-grid">
            <div><div className="summary-num">2</div><div className="muted">changes surfaced</div></div>
            <div><div className="summary-num">1</div><div className="muted">branch rebuilt</div></div>
            <div><div className="summary-num">8</div><div className="muted">fields simulated</div></div>
            <div><div className="summary-num">0</div><div className="muted">real submissions</div></div>
          </div>
        </div>
      );
    }

    function ClientFlow() {
      const [step, setStep] = useState(1);
      const [uploaded, setUploaded] = useState(false);
      const [resolved, setResolved] = useState([]);
      const [logs, setLogs] = useState([]);
      const [filledValues, setFilledValues] = useState(Array(demoData.fill.length).fill(''));

      const runFill = useCallback(() => {
        if (logs.length) return;
        setLogs(['<strong>Tinyfish simulation initialized.</strong> Using reviewed fields and refreshed graph nodes.']);
        setTimeout(() => setLogs((prev) => [...prev, 'ACRA portal shell loaded. Beginning projected fill from approved review state.']), 600);
        demoData.fill.forEach((field, index) => {
          setTimeout(() => {
            setLogs((prev) => [...prev, `Filling <strong>${field[0]}</strong> with <strong>${field[1]}</strong>.`]);
            let n = 0;
            const timer = setInterval(() => {
              n += 2;
              setFilledValues((prev) => {
                const next = [...prev];
                next[index] = field[1].slice(0, n);
                return next;
              });
              if (n >= field[1].length) clearInterval(timer);
            }, 28);
          }, 1100 + index * 700);
        });
        setTimeout(() => {
          setLogs((prev) => [...prev, '<strong>Complete.</strong> Review package is ready for analyst sign-off. No real submission was performed.']);
          setTimeout(() => setStep(5), 800);
        }, 1100 + demoData.fill.length * 700 + 300);
      }, [logs.length]);

      useEffect(() => {
        if (step === 4) runFill();
      }, [step, runFill]);

      const stepClass = (index) => `step ${index < step ? 'done' : index === step ? 'active' : ''}`;

      return (
        <section>
          <div className="hero">
            <div>
              <h2>Atlas Restructuring Pte Ltd</h2>
              <div className="muted">ACRA workflow · Withdrawal from being approved liquidators</div>
            </div>
            <div className="muted">Last run: 28 Mar 2026<br />Canary: Maintenance watch</div>
          </div>

          <div className="steps">
            <div className={stepClass(1)}>01 Changes</div>
            <div className={stepClass(2)}>02 Upload</div>
            <div className={stepClass(3)}>03 Review</div>
            <div className={stepClass(4)}>04 Simulate Fill</div>
            <div className={stepClass(5)}>05 Done</div>
          </div>

          {step === 1 && (
            <>
              <ChangeFeed />
              <div className="hint">
                <span>Pipeline: compare hashes, run semantic diff, refresh changed graph branches</span>
                <button className="btn primary" onClick={() => setStep(2)}>Continue to Upload</button>
              </div>
            </>
          )}

          {step === 2 && (
            <>
              <UploadStep uploaded={uploaded} onUpload={() => setUploaded(true)} />
              {uploaded && (
                <div className="hint">
                  <span>Structured fields and goals prepared for graph trace.</span>
                  <button className="btn primary" onClick={() => setStep(3)}>Continue to Review</button>
                </div>
              )}
            </>
          )}

          {step === 3 && (
            <ReviewStep
              resolved={resolved}
              setResolved={setResolved}
              onContinue={() => setStep(4)}
            />
          )}

          {step === 4 && <PortalStep filledValues={filledValues} logs={logs} />}
          {step === 5 && <DoneStep />}
        </section>
      );
    }

    function App() {
      const [screen, setScreen] = useState('dashboard');
      const breadcrumb = screen === 'dashboard' ? 'Dashboard' : 'Dashboard / Atlas Restructuring';
      return (
        <div className="app-shell">
          <Sidebar screen={screen} onNavigate={setScreen} />
          <main className="main">
            <div className="topbar">
              <div className="breadcrumb">{breadcrumb}</div>
              <div className="topbar-stamp">28 Mar 2026, 9:04 AM</div>
            </div>
            <div className="content">
              {screen === 'dashboard'
                ? <Dashboard onOpenClient={() => setScreen('client')} />
                : <ClientFlow />}
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
